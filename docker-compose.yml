version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - PORT=3000
    # Frontend depends on backend to be ready
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/overview"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_API_URL=http://localhost:3000/api
